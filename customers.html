<!DOCTYPE html>
<html>
<head>
    <title>All Customers</title>

    <style>
        body{
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(120deg,#eef2ff,#f8fafc);
            margin:0;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:40px;
        }

        h1{
            text-align:center;
            color:#1e293b;
            margin-bottom:30px;
        }

        table{
            width:100%;
            border-collapse: collapse;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        th{
            background:#2563eb;
            color:white;
            padding:14px;
            font-size:15px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #e5e7eb;
            color:#334155;
        }

        tr:hover{
            background:#f1f5f9;
            transition:0.3s;
        }

        .risk-high{
            color:#dc2626;
            font-weight:bold;
        }

        .risk-medium{
            color:#d97706;
            font-weight:bold;
        }

        .risk-low{
            color:#059669;
            font-weight:bold;
        }

        .btn{
            background:#2563eb;
            color:white;
            padding:6px 14px;
            border-radius:6px;
            text-decoration:none;
            font-size:14px;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .topnav{
            text-align:center;
            margin-bottom:20px;
        }

        .topnav a{
            margin:0 15px;
            text-decoration:none;
            color:#2563eb;
            font-weight:600;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>All Customers</h1>

    <div class="topnav">
        <a href="/dashboard">⬅ Dashboard</a>
        <a href="/highrisk">🔥 High Risk</a>
        <a href="/download">⬇ Download CSV</a>
    </div>

    <table>
        <tr>
            <th>Customer ID</th>
            <th>Age</th>
            <th>Churn Probability %</th>
            <th>Risk Level</th>
            <th>Action</th>
        </tr>

        {% for c in data %}
        <tr>
            <td>{{c.CustomerId}}</td>
            <td>{{c.Age}}</td>
            <td>{{c.Churn_Prob}}</td>

            <td class="
                {% if c.Risk=='High' %}risk-high
                {% elif c.Risk=='Medium' %}risk-medium
                {% else %}risk-low
                {% endif %}
            ">
                {{c.Risk}}
            </td>

            <td>
                <a class="btn" href="/customer/{{c.CustomerId}}">
                    View
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
