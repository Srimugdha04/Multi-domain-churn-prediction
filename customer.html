<body style="background:#0b132b;font-family:Segoe UI">
<h2 style="text-align:center;color:white">All Customers</h2>
<style>
body{
 font-family: "Segoe UI", sans-serif;
 background: linear-gradient(120deg,#eef2ff,#f8fafc);
 margin:0;

}

/* NAVBAR */
.navbar{
    background:white;
    padding:15px 40px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:600;
    color:#2d5be3;
}

.nav-links a{
    margin-left:20px;
    text-decoration:none;
    color:#1b2a4e;
    font-weight:500;
}

/* DASHBOARD CARDS */
.container{
    padding:40px;
    text-align:center;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:220px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.total{border-left:6px solid #2d5be3;}
.high{border-left:6px solid #e53935;}
.medium{border-left:6px solid #ff9800;}
.low{border-left:6px solid #2ecc71;}

.card h2{
    margin:10px 0;
    font-size:32px;
}

/* TABLE */
table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:white;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

th,td{
    padding:14px;
    border-bottom:1px solid #eee;
}

th{
    background:#2d5be3;
    color:white;
}

tr:hover{
    background:#f1f5ff;
}

/* BUTTON */
.btn{
    padding:8px 14px;
    background:#2d5be3;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    text-decoration:none;
}
</style>
<table border="1" align="center" cellpadding="8">
<tr>
<th>ID</th>
<th>Age</th>
<th>Churn %</th>
<th>Risk</th>
<th>View</th>
</tr>

{% for r in data %}
<tr>
<td>{{r.CustomerId}}</td>
<td>{{r.Age}}</td>
<td>{{r.Churn_Prob}}</td>
<td>{{r.Risk}}</td>
<td><a href="/customer/{{r.CustomerId}}">Open</a></td>
</tr>
{% endfor %}
</table>

</body>
